<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Strategic Monitor — Beauty x Tech</title>
<meta name="color-scheme" content="light dark">

<style>
/* Design System */
:root {
  --bg: #f4f3f1;
  --surface: #ffffff;
  --text: #111;
  --muted: #666;
  --border: #e2e2e2;
  --accent: #C8A46A;
  --danger: #C84C4C;
  --success: #2E8B57;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e1114;
    --surface: #15181c;
    --text: #f1f1f1;
    --muted: #9ca3af;
    --border: #2a2e33;
  }
}

[data-theme="dark"] {
  --bg: #0e1114;
  --surface: #15181c;
  --text: #f1f1f1;
  --muted: #9ca3af;
  --border: #2a2e33;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 18px 24px;
  z-index: 1000;
}

.header-grid {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.title {
  font-size: 20px;
  font-weight: 600;
}

.subtitle {
  font-size: 12px;
  letter-spacing: 1px;
  color: var(--accent);
}

.controls {
  margin-left: auto;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

input, button {
  padding: 6px 10px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text);
  border-radius: 4px;
}

button:hover {
  border-color: var(--accent);
  cursor: pointer;
}

.status-bar {
  margin-top: 8px;
  font-size: 12px;
  color: var(--muted);
}

main {
  max-width: 1400px;
  margin: 40px auto;
  padding: 0 20px;
}

section {
  margin-bottom: 60px;
}

section h2 {
  font-size: 16px;
  border-left: 4px solid var(--accent);
  padding-left: 10px;
  margin-bottom: 20px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 6px;
  margin-bottom: 12px;
}

.grid {
  display: grid;
  gap: 20px;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

.list-dense {
  font-size: 13px;
  line-height: 1.8;
}

footer {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  padding: 40px 0;
}

.loading {
  text-align: center;
  padding: 40px;
  color: var(--muted);
}
</style>
</head>

<body>

<header>
  <div class="header-grid">
    <div>
      <div class="title">AI Strategic Monitor</div>
      <div class="subtitle">Beauty x Tech — Executive Intelligence</div>
    </div>
    <div class="controls">
      <input type="search" id="searchInput" placeholder="Recherche">
      <button id="sortBtn">Tri: Date</button>
      <button id="refreshBtn">Refresh</button>
      <button id="themeToggle">Thème</button>
      <button id="exportBtn">Export</button>
      <button id="importBtn">Import</button>
      <input type="file" id="fileInput" hidden accept=".json">
    </div>
  </div>
  <div class="status-bar" id="statusBar">Chargement...</div>
</header>

<main id="app"><div class="loading">⏳ Chargement des données...</div></main>
<footer>Architecture Seed / Cache / Live — GitHub Pages Compatible</footer>

<script type="application/json" id="seed-data">
{
  "version": "2.0",
  "ui_config": {
    "proxy_url": "https://api.allorigins.win/raw?url=",
    "limits": {
      "gpt": 25,
      "general": 15,
      "commerce": 12,
      "geo": 12,
      "media": 12,
      "beauty": 12
    }
  },
  "sources": [
    {
      "name": "OpenAI Blog",
      "type": "rss",
      "url": "https://openai.com/blog/rss",
      "category_hint": "gpt",
      "actor_hint": "OpenAI",
      "tier": 1,
      "enabled": true
    },
    {
      "name": "Google AI Blog",
      "type": "rss",
      "url": "https://blog.google/technology/ai/rss/",
      "category_hint": "gpt",
      "actor_hint": "Google",
      "tier": 1,
      "enabled": true
    },
    {
      "name": "Anthropic News",
      "type": "rss",
      "url": "https://www.anthropic.com/news/rss.xml",
      "category_hint": "gpt",
      "actor_hint": "Anthropic",
      "tier": 1,
      "enabled": true
    },
    {
      "name": "TechCrunch AI",
      "type": "rss",
      "url": "https://techcrunch.com/tag/artificial-intelligence/feed/",
      "category_hint": "general",
      "actor_hint": "Other",
      "tier": 1,
      "enabled": true
    }
  ],
  "taxonomy": {
    "actors": {
      "OpenAI": ["openai", "gpt", "chatgpt"],
      "Google": ["google", "gemini", "bard"],
      "Anthropic": ["anthropic", "claude"],
      "Mistral": ["mistral"],
      "Meta": ["meta", "llama"],
      "Microsoft": ["microsoft", "copilot"]
    },
    "categories": {
      "gpt": ["gpt", "llm", "model", "api"],
      "commerce": ["commerce", "retail", "shopping", "ads", "advertising"],
      "geo": ["regulation", "eu", "search", "seo", "law", "gdpr"],
      "media": ["publisher", "media", "creator", "content"],
      "beauty": ["beauty", "cosmetics", "lvmh", "sephora", "makeup"],
      "china": ["china", "beijing", "shanghai", "baidu"]
    }
  },
  "manual_items": []
}
</script>

<script>
// ========================================
// STATE INITIALIZATION
// ========================================
const STATE = {
  seed: null,
  cache: { items: [], fetched_at: null, source_status: {} },
  items: [],
  filtered: [],
  sort: "date"
};

// ========================================
// LOADERS & CACHE
// ========================================
function loadSeedData() {
  try {
    STATE.seed = JSON.parse(document.getElementById("seed-data").textContent);
  } catch(e) {
    console.error("Erreur chargement seed:", e);
    STATE.seed = { sources: [], taxonomy: {}, manual_items: [], ui_config: { limits: {} } };
  }
}

function loadCache() {
  try {
    const c = localStorage.getItem("ai_cache");
    if (c) {
      STATE.cache = JSON.parse(c);
      STATE.items = STATE.cache.items || [];
    }
  } catch(e) {
    console.warn("Cache invalide:", e);
  }
}

function saveCache() {
  try {
    localStorage.setItem("ai_cache", JSON.stringify({
      items: STATE.items,
      fetched_at: new Date().toISOString(),
      source_status: STATE.cache.source_status
    }));
  } catch(e) {
    console.error("Erreur sauvegarde cache:", e);
  }
}

// ========================================
// FETCH LIVE avec CORS Proxy
// ========================================
async function fetchAllSources() {
  const sources = STATE.seed.sources.filter(s => s.enabled);
  const proxy = STATE.seed.ui_config.proxy_url;
  let results = [];
  
  for (const s of sources) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000);
      
      // Utilisation du proxy CORS
      const url = proxy + encodeURIComponent(s.url);
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);
      
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      
      const text = await res.text();
      let items = [];
      
      if (s.type === "rss" || s.type === "atom") {
        items = parseRSS(text, s);
      } else if (s.type === "json") {
        items = parseJSON(text, s);
      }
      
      results.push(...items);
      STATE.cache.source_status[s.name] = "✓ OK";
      console.log(`✓ ${s.name}: ${items.length} items`);
    } catch (e) {
      console.warn(`✗ ${s.name}:`, e.message);
      STATE.cache.source_status[s.name] = "✗ FAIL";
    }
  }
  
  return results;
}

// ========================================
// PARSERS
// ========================================
function parseRSS(xmlText, meta) {
  try {
    const xml = new DOMParser().parseFromString(xmlText, "text/xml");
    const items = [...xml.querySelectorAll("item, entry")];
    
    return items.map(i => {
      const title = i.querySelector("title")?.textContent || "";
      const description = i.querySelector("description, summary, content")?.textContent || "";
      const pubDate = i.querySelector("pubDate, published, updated")?.textContent || "";
      const link = i.querySelector("link")?.textContent || i.querySelector("link")?.getAttribute("href") || "";
      
      return normalizeItem({ title, summary: description, date_published: pubDate, url: link }, meta);
    }).filter(i => i.title);
  } catch(e) {
    console.error("Erreur parsing RSS:", e);
    return [];
  }
}

function parseJSON(jsonText, meta) {
  try {
    const data = JSON.parse(jsonText);
    if (!Array.isArray(data)) return [];
    return data.map(i => normalizeItem({
      title: i.title,
      summary: i.summary || i.description,
      date_published: i.date || i.pubDate,
      url: i.url || i.link
    }, meta));
  } catch(e) {
    console.error("Erreur parsing JSON:", e);
    return [];
  }
}

// ========================================
// NORMALIZE & SCORING
// ========================================
function normalizeItem(raw, meta) {
  const cleanHTML = (html) => (html || "").replace(/<[^>]+>/g, "").trim();
  const id = btoa(encodeURIComponent((raw.url || "") + raw.title)).slice(0, 24);
  
  const item = {
    id,
    title: cleanHTML(raw.title) || "Sans titre",
    summary: cleanHTML(raw.summary).slice(0, 250),
    date_published: new Date(raw.date_published || Date.now()).toISOString(),
    source_name: meta.name,
    url: raw.url || "#",
    actor: meta.actor_hint || "Other",
    category: meta.category_hint || "general",
    importance: 50
  };
  
  item.importance = scoreItem(item);
  categorizeItem(item);
  
  return item;
}

function dedupeItems(items) {
  const map = new Map();
  items.forEach(i => {
    const key = i.url || i.title.toLowerCase();
    if (!map.has(key)) map.set(key, i);
  });
  return Array.from(map.values());
}

function scoreItem(item) {
  let score = 50;
  const txt = (item.title + " " + item.summary).toLowerCase();
  
  if (/launch|release|api|model|partnership|breakthrough/.test(txt)) score += 20;
  if (/openai|google|anthropic|mistral|meta/.test(txt)) score += 15;
  if (/gpt-5|gemini|claude/.test(txt)) score += 10;
  
  return Math.min(score, 100);
}

function categorizeItem(item) {
  const txt = (item.title + " " + item.summary).toLowerCase();
  const tax = STATE.seed.taxonomy;
  
  // Catégorisation
  for (const [cat, keywords] of Object.entries(tax.categories || {})) {
    if (keywords.some(kw => txt.includes(kw.toLowerCase()))) {
      item.category = cat;
      break;
    }
  }
  
  // Acteurs
  for (const [actor, keywords] of Object.entries(tax.actors || {})) {
    if (keywords.some(kw => txt.includes(kw.toLowerCase()))) {
      item.actor = actor;
      break;
    }
  }
}

// ========================================
// FILTERS & SORT
// ========================================
function applyFiltersAndSort() {
  let items = [...STATE.items];
  const q = document.getElementById("searchInput").value.toLowerCase();
  
  if (q) {
    items = items.filter(i => 
      (i.title + i.summary + i.actor).toLowerCase().includes(q)
    );
  }
  
  if (STATE.sort === "date") {
    items.sort((a, b) => new Date(b.date_published) - new Date(a.date_published));
  } else {
    items.sort((a, b) => b.importance - a.importance);
  }
  
  STATE.filtered = items;
}

// ========================================
// IMPORT / EXPORT
// ========================================
function exportJSON() {
  const blob = new Blob([JSON.stringify(STATE.items, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `ai_dashboard_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      STATE.items = dedupeItems(data);
      saveCache();
      renderApp();
    } catch(err) {
      alert("Fichier JSON invalide");
    }
  };
  reader.readAsText(file);
}

// ========================================
// EVENT HANDLERS
// ========================================
document.getElementById("refreshBtn").onclick = async () => {
  document.getElementById("statusBar").textContent = "⏳ Rafraîchissement...";
  const live = await fetchAllSources();
  STATE.items = dedupeItems([...STATE.seed.manual_items, ...live]);
  saveCache();
  renderApp();
};

document.getElementById("sortBtn").onclick = () => {
  STATE.sort = STATE.sort === "date" ? "importance" : "date";
  document.getElementById("sortBtn").textContent = `Tri: ${STATE.sort === "date" ? "Date" : "Importance"}`;
  renderApp();
};

document.getElementById("themeToggle").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
};

document.getElementById("exportBtn").onclick = exportJSON;
document.getElementById("importBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e => {
  if (e.target.files[0]) importJSON(e.target.files[0]);
};

document.getElementById("searchInput").oninput = () => renderApp();

// ========================================
// RENDER SECTIONS
// ========================================
function renderApp() {
  applyFiltersAndSort();
  const app = document.getElementById("app");
  app.innerHTML = "";
  
  app.appendChild(renderSection("GPT / LLM (7 derniers jours)", "gpt", 7));
  app.appendChild(renderSection("Commerce & Retail", "commerce", 30));
  app.appendChild(renderSection("Régulation & GEO", "geo", 30));
  app.appendChild(renderSection("Media & Publishers", "media", 30));
  app.appendChild(renderSection("Beauty Watch", "beauty", 90));
  app.appendChild(renderSection("China Focus", "china", 30));
  app.appendChild(renderSection("Grandes Annonces IA", "general", 30));
  
  updateStatusBar();
}

function renderSection(title, category, daysBack) {
  const sec = document.createElement("section");
  sec.innerHTML = `<h2>${title}</h2>`;
  
  const cutoff = Date.now() - (daysBack * 86400000);
  const items = STATE.filtered.filter(i => 
    i.category === category && new Date(i.date_published) > cutoff
  ).slice(0, STATE.seed.ui_config.limits[category] || 15);
  
  if (items.length === 0) {
    sec.innerHTML += `<div class="card">Aucune information récente disponible.</div>`;
    return sec;
  }
  
  const grid = document.createElement("div");
  grid.className = "grid";
  
  items.forEach(i => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <strong>${i.title}</strong><br>
      <small style="color: var(--accent)">${i.actor} • ${new Date(i.date_published).toLocaleDateString('fr-FR')}</small><br>
      <div class="list-dense" style="margin-top: 8px">${i.summary}</div>
      ${i.url !== "#" ? `<a href="${i.url}" target="_blank" style="font-size: 11px">→ Lire plus</a>` : ""}
    `;
    grid.appendChild(card);
  });
  
  sec.appendChild(grid);
  return sec;
}

function updateStatusBar() {
  const sb = document.getElementById("statusBar");
  const fetchDate = STATE.cache.fetched_at 
    ? new Date(STATE.cache.fetched_at).toLocaleString('fr-FR')
    : "Jamais";
  
  const sources = Object.entries(STATE.cache.source_status || {})
    .map(([k, v]) => `${k}: ${v}`)
    .join(" | ");
  
  sb.innerHTML = `📊 ${STATE.items.length} articles | Dernière MAJ: ${fetchDate}${sources ? " | " + sources : ""}`;
}

// ========================================
// INITIALIZATION
// ========================================
window.addEventListener("load", async () => {
  loadSeedData();
  loadCache();
  
  // Affichage initial du cache
  if (STATE.items.length > 0) {
    renderApp();
  }
  
  // Fetch automatique au démarrage
  try {
    const live = await fetchAllSources();
    STATE.items = dedupeItems([...STATE.seed.manual_items, ...live]);
    saveCache();
    renderApp();
  } catch(e) {
    console.warn("Erreur fetch live:", e);
    if (STATE.items.length === 0) {
      document.getElementById("app").innerHTML = `
        <div class="card" style="text-align: center; padding: 40px">
          <h3>⚠️ Impossible de charger les flux RSS</h3>
          <p>Vérifiez votre connexion internet ou réessayez plus tard.</p>
        </div>
      `;
    }
  }
});
</script>

</body>
</html>
