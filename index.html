<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Daily Briefing — Beauty x Tech | Dior</title>
<meta name="color-scheme" content="light dark">
<style>
:root{
  --bg:#f6f6f4;
  --card:#ffffff;
  --text:#111;
  --muted:#6c6c6c;
  --accent:#C8A46A;
  --border:#e5e5e5;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0e0f11;
    --card:#16181b;
    --text:#f2f2f2;
    --muted:#9da3aa;
    --border:#2a2d31;
  }
}
[data-theme="dark"]{
  --bg:#0e0f11;
  --card:#16181b;
  --text:#f2f2f2;
  --muted:#9da3aa;
  --border:#2a2d31;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
}
.header-top{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
}
h1{font-size:20px;margin:0;font-weight:600}
.subtitle{font-size:12px;color:var(--accent);letter-spacing:1px}
.controls{
  margin-left:auto;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
input[type="search"]{
  padding:6px 8px;
  border:1px solid var(--border);
  background:var(--card);
  color:var(--text);
}
button{
  padding:6px 10px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
  color:var(--text);
}
button:hover{border-color:var(--accent)}
.status-bar{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}
main{
  padding:20px;
  max-width:1500px;
  margin:auto;
}
section{margin-bottom:40px}
section h2{
  font-size:16px;
  margin-bottom:14px;
  border-left:4px solid var(--accent);
  padding-left:8px;
}
.grid{
  display:grid;
  gap:16px;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  padding:12px;
}
.card h3{
  font-size:14px;
  margin:0 0 6px;
}
.card p{
  font-size:13px;
  margin:0 0 6px;
  color:var(--muted);
}
.timeline-item{
  border-left:2px solid var(--accent);
  padding-left:8px;
  margin-bottom:12px;
}
.image{
  width:100%;
  height:130px;
  background:linear-gradient(135deg,#ddd,#bbb);
  margin-bottom:8px;
}
.actor-title{
  font-weight:600;
  margin-bottom:6px;
}
.small{
  font-size:12px;
  color:var(--muted);
}
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>AI Daily Briefing</h1>
      <div class="subtitle">Beauty x Tech | Dior</div>
    </div>
    <div class="controls">
      <input type="search" id="searchInput" placeholder="Recherche...">
      <button id="themeToggle">Thème</button>
      <button id="refreshBtn">Refresh</button>
      <button id="sortBtn">Tri: Date</button>
    </div>
  </div>
  <div class="status-bar" id="statusBar">Initialisation...</div>
</header>

<main id="app"></main>

<footer>
Auto-refresh activé • Cache intelligent • GitHub Pages ready
</footer>

<script>
/* ================================
   CONFIGURATION SOURCES
================================ */
const SOURCES = [
  {name:"OpenAI Blog", url:"https://openai.com/blog/rss", actor:"OpenAI", category:"gpt", tier:1},
  {name:"Google AI Blog", url:"https://blog.google/technology/ai/rss/", actor:"Google", category:"gpt", tier:1},
  {name:"Anthropic News", url:"https://www.anthropic.com/news/rss.xml", actor:"Anthropic", category:"gpt", tier:1},
  {name:"TechCrunch AI", url:"https://techcrunch.com/tag/artificial-intelligence/feed/", actor:"Other", category:"general", tier:1},
  {name:"The Verge AI", url:"https://www.theverge.com/ai-artificial-intelligence/rss/index.xml", actor:"Other", category:"general", tier:1}
];

let STATE = {
  items:[],
  filtered:[],
  sortMode:"date"
};

/* ================================
   UTILITIES
================================ */
function hash(str){
  let h=0;
  for(let i=0;i<str.length;i++){
    h=(h<<5)-h+str.charCodeAt(i);
    h|=0;
  }
  return Math.abs(h).toString();
}
function score(item){
  let s=50;
  const text=(item.title+" "+item.summary).toLowerCase();
  if(/launch|release|api|model/.test(text)) s+=20;
  if(/openai|google|anthropic|mistral/.test(text)) s+=15;
  const ageHours=(Date.now()-new Date(item.date))/3600000;
  if(ageHours<72) s+=15;
  return Math.min(s,100);
}
function dedupe(items){
  const seen=new Map();
  items.forEach(i=>{
    const key=i.url || i.title;
    if(!seen.has(key)) seen.set(key,i);
  });
  return Array.from(seen.values());
}

/* ================================
   FETCH RSS
================================ */
async function fetchRSS(source){
  try{
    const res=await fetch(source.url);
    const text=await res.text();
    const parser=new DOMParser();
    const xml=parser.parseFromString(text,"text/xml");
    const entries=[...xml.querySelectorAll("item, entry")];
    return entries.map(e=>{
      const title=e.querySelector("title")?.textContent || "";
      const link=e.querySelector("link")?.textContent || e.querySelector("link")?.getAttribute("href") || "";
      const date=e.querySelector("pubDate, updated, published")?.textContent || new Date().toISOString();
      const summary=e.querySelector("description, summary")?.textContent || "";
      return {
        id:hash(link+title+date),
        title,
        url:link,
        summary:summary.replace(/<[^>]+>/g,"").slice(0,200),
        date,
        actor:source.actor,
        category:source.category,
        source:source.name
      };
    });
  }catch(err){
    console.warn("Erreur source:",source.name);
    return [];
  }
}

/* ================================
   LOAD ALL SOURCES
================================ */
async function loadAll(){
  document.getElementById("statusBar").textContent="Mise à jour...";
  const results=await Promise.all(SOURCES.map(fetchRSS));
  const flat=results.flat();
  STATE.items=dedupe(flat).map(i=>({...i, importance:score(i)}));
  localStorage.setItem("ai_cache",JSON.stringify(STATE.items));
  document.getElementById("statusBar").textContent="Dernière mise à jour : "+new Date().toLocaleString();
  render();
}

/* ================================
   RENDER
================================ */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  let items=[...STATE.items];
  if(STATE.sortMode==="date"){
    items.sort((a,b)=>new Date(b.date)-new Date(a.date));
  }else{
    items.sort((a,b)=>b.importance-a.importance);
  }
  STATE.filtered=items;

  app.appendChild(renderSection("Synthèse GPT (7 jours)","gpt",true));
  app.appendChild(renderSection("General AI News","general",false,true));
}
function renderSection(title,category,timeline=false,images=false){
  const section=document.createElement("section");
  section.innerHTML="<h2>"+title+"</h2>";
  const container=document.createElement("div");
  container.className=timeline?"":"grid";
  const weekAgo=Date.now()-7*24*60*60*1000;
  const items=STATE.filtered.filter(i=>i.category===category && new Date(i.date)>weekAgo);
  items.slice(0,12).forEach(i=>{
    if(timeline){
      const div=document.createElement("div");
      div.className="timeline-item";
      div.innerHTML="<strong>"+i.title+"</strong><div class='small'>"+i.source+" — "+new Date(i.date).toLocaleDateString()+"</div>";
      container.appendChild(div);
    }else{
      const card=document.createElement("div");
      card.className="card";
      let img=images?"<div class='image'></div>":"";
      card.innerHTML=img+"<h3>"+i.title+"</h3><p>"+i.summary+"</p><div class='small'>"+i.source+"</div>";
      container.appendChild(card);
    }
  });
  section.appendChild(container);
  return section;
}

/* ================================
   EVENTS
================================ */
document.getElementById("refreshBtn").addEventListener("click",loadAll);
document.getElementById("sortBtn").addEventListener("click",()=>{
  STATE.sortMode=STATE.sortMode==="date"?"importance":"date";
  document.getElementById("sortBtn").textContent="Tri: "+(STATE.sortMode==="date"?"Date":"Importance");
  render();
});
document.getElementById("themeToggle").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme",cur==="dark"?"light":"dark");
});

/* ================================
   INIT
================================ */
window.addEventListener("load",()=>{
  const cache=localStorage.getItem("ai_cache");
  if(cache){
    STATE.items=JSON.parse(cache);
    render();
  }
  loadAll();
});
</script>

</body>
</html>
