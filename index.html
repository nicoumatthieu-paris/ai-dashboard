<script>

/* =========================================================

<script>
/* =========================================================
   PART 2 / 3 — LOGIQUE ULTRA-PREMIUM
========================================================= */

/* ================================
LOADERS & CACHE
=============================== */
function loadSeedData() {
  STATE.seed = JSON.parse(document.getElementById("seed-data").textContent);
}
function loadCache() {
  const c = localStorage.getItem("ai_cache");
  if (c) STATE.cache = JSON.parse(c);
  else STATE.cache = {items:[], fetched_at:null, source_status:{}};
}
function saveCache() {
  localStorage.setItem("ai_cache", JSON.stringify({
    items: STATE.items,
    fetched_at: new Date().toISOString(),
    source_status: STATE.cache.source_status
  }));
}

/* ================================
FETCH LIVE
=============================== */
async function fetchAllSources() {
  const sources = STATE.seed.sources.filter(s => s.enabled);
  let results = [];
  for (const s of sources) {
    try {
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      const res = await fetch(s.url, {signal: controller.signal});
      clearTimeout(timeout);
      const text = await res.text();
      let items = [];
      if (s.type === "rss") items = parseRSS(text, s);
      else if (s.type === "atom") items = parseAtom(text, s);
      else if (s.type === "json") items = parseJSON(text, s);
      results.push(...items);
      STATE.cache.source_status[s.name] = "OK";
    } catch (e) {
      console.warn("Source fail:", s.name, e);
      STATE.cache.source_status[s.name] = "FAIL";
    }
  }
  return results;
}

function parseRSS(xmlText, meta) {
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  const items = [...xml.querySelectorAll("item")];
  return items.map(i => normalizeItem({
    title: i.querySelector("title")?.textContent,
    summary: i.querySelector("description")?.textContent,
    date_published: i.querySelector("pubDate")?.textContent,
    url: i.querySelector("link")?.textContent
  }, meta));
}
function parseAtom(xmlText, meta) {
  const xml = new DOMParser().parseFromString(xmlText, "text/xml");
  const items = [...xml.querySelectorAll("entry")];
  return items.map(i => normalizeItem({
    title: i.querySelector("title")?.textContent,
    summary: i.querySelector("summary")?.textContent || i.querySelector("content")?.textContent,
    date_published: i.querySelector("updated")?.textContent,
    url: i.querySelector("link")?.getAttribute("href")
  }, meta));
}
function parseJSON(jsonText, meta) {
  const data = JSON.parse(jsonText);
  if (!Array.isArray(data)) return [];
  return data.map(i => normalizeItem({
    title: i.title,
    summary: i.summary,
    date_published: i.date,
    url: i.url
  }, meta));
}

/* ================================
NORMALIZE & SCORING
=============================== */
function normalizeItem(raw, meta) {
  const id = btoa((raw.url || "") + raw.title + (raw.date_published || "")).slice(0, 24);
  const item = {
    id,
    title: raw.title || "",
    summary: (raw.summary || "").replace(/<[^>]+>/g, "").slice(0, 250),
    content: "",
    date_published: new Date(raw.date_published || Date.now()).toISOString(),
    source_name: meta.name,
    source_url: meta.url,
    url: raw.url || "#",
    actor: meta.actor_hint || "Other",
    category: meta.category_hint || "general",
    tags: [],
    importance: 0,
    image: null
  };
  item.importance = scoreItem(item, meta);
  item.category = categorizeItem(item, STATE.seed.taxonomy);
  return item;
}

function dedupeItems(items) {
  const map = new Map();
  items.forEach(i => {
    const key = i.url || i.title.toLowerCase();
    if (!map.has(key)) map.set(key, i);
  });
  return Array.from(map.values());
}

function scoreItem(item, meta) {
  let score = 50;
  const txt = (item.title + " " + item.summary).toLowerCase();
  if (/launch|release|api|model|partnership/.test(txt)) score += 20;
  if (/openai|google|anthropic|mistral/.test(txt)) score += 15;
  if (meta.tier === 1) score += 10;
  return Math.min(score, 100);
}

function categorizeItem(item, taxonomy) {
  for (const [cat, keywords] of Object.entries(taxonomy.categories)) {
    for (const kw of keywords) {
      if ((item.title + item.summary).toLowerCase().includes(kw)) {
        item.category = cat;
        return cat;
      }
    }
  }
  for (const [actor, keywords] of Object.entries(taxonomy.actors)) {
    for (const kw of keywords) {
      if ((item.title + item.summary).toLowerCase().includes(kw)) {
        item.actor = actor;
      }
    }
  }
  return item.category;
}

/* ================================
FILTERS & SORT
=============================== */
function applyFiltersAndSort() {
  let items = [...STATE.items];
  const q = document.getElementById("searchInput").value.toLowerCase();
  if (q) items = items.filter(i => (i.title + i.summary + i.actor).toLowerCase().includes(q));
  if (STATE.sort === "date") items.sort((a,b) => new Date(b.date_published) - new Date(a.date_published));
  else items.sort((a,b) => b.importance - a.importance);
  STATE.filtered = items;
}

/* ================================
IMPORT & EXPORT
=============================== */
function exportJSON() {
  const blob = new Blob([JSON.stringify(STATE.items,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "ai_dashboard_export.json";
  a.click();
}
function importJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const data = JSON.parse(e.target.result);
    STATE.items = dedupeItems(data);
    saveCache();
    renderApp();
  };
  reader.readAsText(file);
}

/* ================================
USER INTERACTIONS
=============================== */
document.getElementById("refreshBtn").onclick = async () => {
  const live = await fetchAllSources();
  STATE.items = dedupeItems([...STATE.seed.manual_items, ...live]);
  saveCache();
  renderApp();
};
document.getElementById("sortBtn").onclick = () => {
  STATE.sort = STATE.sort === "date" ? "importance" : "date";
  renderApp();
};
document.getElementById("themeToggle").onclick = () => {
  const cur = document.documentElement.getAttribute("data-theme");
  document.documentElement.setAttribute("data-theme", cur === "dark" ? "light" : "dark");
};
document.getElementById("exportBtn").onclick = exportJSON;
document.getElementById("importBtn").onclick = () => document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = e => {
  if (e.target.files[0]) importJSON(e.target.files[0]);
};
document.getElementById("searchInput").oninput = renderApp;

</script>

<script>
/* =========================================================
   PART 3 / 3 — RENDU ULTRA-PREMIUM 7 SECTIONS
========================================================= */

function renderApp() {
  applyFiltersAndSort();
  const app = document.getElementById("app");
  app.innerHTML = "";

  // 1️⃣ Synthèse GPT — “en un trou” factuelle
  app.appendChild(renderSectionGPT());

  // 2️⃣ Commerce
  app.appendChild(renderSectionCommerce());

  // 3️⃣ GEO
  app.appendChild(renderSectionGeo());

  // 4️⃣ Media
  app.appendChild(renderSectionMedia());

  // 5️⃣ Beauty Watch
  app.appendChild(renderSectionBeauty());

  // 6️⃣ China Focus
  app.appendChild(renderSectionChina());

  // 7️⃣ Grandes annonces IA
  app.appendChild(renderSectionGeneral());

  // Mise à jour barre de statut
  const sb = document.getElementById("statusBar");
  sb.textContent = "Dernière mise à jour : " + (STATE.cache.fetched_at ? new Date(STATE.cache.fetched_at).toLocaleString() : "Seed");
  sb.innerHTML += " | Sources : " + Object.entries(STATE.cache.source_status || {}).map(([k,v]) => `${k}: ${v}`).join(" | ");
}

/* ================================
SECTION 1 — GPT synthèse factuelle
=============================== */
function renderSectionGPT() {
  const sec = document.createElement("section");
  sec.innerHTML = "<h2>Synthèse GPT (7 jours)</h2>";

  // Filtrer les 7 derniers jours
  const week = Date.now() - 7*86400000;
  const gptItems = STATE.filtered.filter(i => i.category==="gpt" && new Date(i.date_published) > week);

  // Générer synthèse factuelle “en un trou”
  const summary = document.createElement("div");
  summary.className = "card";
  if(gptItems.length === 0){
    summary.textContent = "Aucune information GPT récente disponible.";
  } else {
    summary.innerHTML = gptItems.map(i =>
      `<strong>${i.title}</strong> — ${i.actor}, ${new Date(i.date_published).toLocaleDateString()}`
    ).join("<br>");
  }
  sec.appendChild(summary);
  return sec;
}

/* ================================
SECTION 2 — Commerce
=============================== */
function renderSectionCommerce() {
  const sec = document.createElement("section");
  sec.innerHTML = "<h2>Commerce — Situation à date</h2>";
  const grid = document.createElement("div");
  grid.className = "grid";

  const commerceItems = STATE.filtered.filter(i=>i.category==="commerce");
  const actors = [...new Set(commerceItems.map(i=>i.actor))];

  actors.forEach(actor=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<h3>${actor}</h3>`;
    // Situation à date factuelle
    const summary = commerceItems.filter(i=>i.actor===actor)
      .map(i=>`- ${i.title} (${new Date(i.date_published).toLocaleDateString()})`).join("<br>");
    card.innerHTML += `<div class="list-dense">${summary || "Aucune info"}</div>`;
    grid.appendChild(card);
  });

  sec.appendChild(grid);
  return sec;
}

SECTION 3 — GEO

SECTION 4 — Media
=============================== */
function renderSectionMedia() {

function renderSectionChina() {

  const grid = document.createElement("div");
  grid.className = "grid";

  const chinaItems = STATE.filtered.filter(i=>i.category==="china");
  chinaItems.forEach(i=>{

    grid.appendChild(card);

/* ================================
SECTION 7 — Grandes annonces IA
=============================== */
function renderSectionGeneral() {
  const sec = document.createElement("section");
  sec.innerHTML = "<h2>Grandes annonces IA</h2>";
  const grid = document.createElement("div");
  grid.className = "grid";

  const generalItems = STATE.filtered.filter(i=>i.category==="general")

  generalItems.forEach(i=>{
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `<div class="image"></div><strong>${i.title}</strong><br>${i.summary}`;
    grid.appendChild(card);
  });

  sec.appendChild(grid);
  return sec;
}

/* ================================
INITIALIZATION
=============================== */
window.addEventListener("load", async () => {
  loadSeedData();
  loadCache();
  // Démarrage avec manual_items
  STATE.items = STATE.seed.manual_items.slice();
  renderApp();

  // Tentative live fetch
  try {
    const live = await fetchAllSources();
    STATE.items = dedupeItems([...STATE.seed.manual_items, ...live]);
    saveCache();
    renderApp();
  } catch(e){
    document.getElementById("statusBar").textContent = "Live fetch indisponible — affichage cache/seed";
    console.warn(e);
  }
});
</script>
